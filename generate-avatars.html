<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>生成头像图片</title>
</head>
<body>
    <h1>生成头像图片</h1>
    <div id="output"></div>
    
    <script>
        // 世代颜色缓存
        const generationColorCache = {};

        // 生成随机颜色（与 index.html 中的方法一致）
        function generateRandomColor() {
            const r = Math.floor(Math.random() * 128) + 50; // 50-178
            const g = Math.floor(Math.random() * 128) + 50; // 50-178
            const b = Math.floor(Math.random() * 128) + 50; // 50-178
            return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
        }

        // 获取世代颜色
        function getGenerationColor(generation) {
            // 如果这一代已经有分配的颜色，直接返回
            if (generationColorCache[generation]) {
                return generationColorCache[generation];
            }

            // 生成更亮的颜色
            const randomColor = generateRandomColor();
            
            // 缓存这一代的颜色
            generationColorCache[generation] = randomColor;
            
            return randomColor;
        }

        // 生成头像
        function generateAvatar(name, id, generation) {
            const backgroundColor = getGenerationColor(generation);
            const safeName = name || '未知';
            const displayName = safeName.slice(0, 4);
            const fontSize = displayName.length === 1 ? 60 : 
                            displayName.length === 2 ? 50 : 
                            displayName.length === 3 ? 40 : 32;
            
            const canvas = document.createElement('canvas');
            canvas.width = 150;
            canvas.height = 150;
            const ctx = canvas.getContext('2d');
            
            // 设置背景色
            ctx.fillStyle = backgroundColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 设置文字样式
            ctx.fillStyle = 'white';
            ctx.font = `bold ${fontSize}px 'Source Han Sans CN', 'Noto Sans CJK', 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', 'Heiti TC', 'STHeiti', 'SimHei', 'Arial Unicode MS', 'Droid Sans Fallback', sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 绘制文字
            ctx.fillText(displayName, canvas.width / 2, canvas.height / 2);
            
            // 生成图片数据
            const imgData = canvas.toDataURL('image/png');
            
            // 显示在页面上
            const output = document.getElementById('output');
            const div = document.createElement('div');
            div.style.margin = '10px 0';
            div.style.padding = '10px';
            div.style.border = '1px solid #ddd';
            div.style.borderRadius = '5px';
            div.innerHTML = `
                <h3>ID: ${id}</h3>
                <p>名字: ${name}</p>
                <p>世代: ${generation}</p>
                <p>背景色: ${backgroundColor}</p>
                <p>文件名: ${id}${backgroundColor}.png</p>
                <img src="${imgData}" alt="${name}" width="150" height="150">
                <p>Base64数据:</p>
                <textarea style="width: 100%; height: 100px;">${imgData}</textarea>
            `;
            output.appendChild(div);
            
            // 自动下载图片
            // 创建下载按钮供用户手动点击下载
            const downloadBtn = document.createElement('button');
            downloadBtn.textContent = '下载图片';
            downloadBtn.style.marginTop = '10px';
            downloadBtn.onclick = function() {
                const a = document.createElement('a');
                a.href = imgData;
                a.download = `${id}${backgroundColor}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
            div.appendChild(downloadBtn);

            return imgData;
        }

        // 生成所有头像
        fetch('./new_family.json').then(response => response.json()).then(data => {
            data.forEach(member => {
                generateAvatar(member.name, member.id, member.generation);
            });
        });
    </script>
</body>
</html>
