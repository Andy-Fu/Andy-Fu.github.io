    <script>
        // 扩展区汉字图片数据（在电脑端预生成）
        const extensionCharImages = {
            '𰾫': 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAAAXNSR0IArs4c6QAAAedJREFUSEvtlb/LQWEUx79GP8pAWSXFRpLFf2BRDAqbQWyKSQiTUjYxmGRgk1IWEyWDGBQmo8QmRm/n1NWL50a9r+XtfZZ779Nzz/ecz/meexXX6/WKDy7F3xVYr9doNBrI5/NQKpU3iOPxGNvtFqFQCN1uF1arFRaLRRayLCIKRAGCwSDsdjvoWVrFYhGtVgvVapX36V6n0wlFZAUqlQo8Hg+/1O/34XK5QIFjsRhOpxN8Ph/K5TLi8ThUKhXO57NQRChwuVxQq9UwnU6h1Wrh9/sxmUxgMplgNBoZkdPpRCAQwGKx4CRsNhva7fYTLqEA8V+tVvB6vU/sJQGNRgO9Xg+Hw8E9oqREVQgFCEU2m70Fj0ajXMV+v+cKlsslDAYDN5iqSKVS3HTRehI4Ho+YzWacGTUxmUxyZrQnCTSbTSQSCcZBmedyOUQiEaGbngQ2m82tWZLAo02HwyEymcxb8y+sgModDAZ3AQqFAjf5EQX1i1xGFb2FSDpEqL5XQF4Ph8PCIHIOosOyc/AoIE0w2ZMcRg2Wrj+qgAapVCrBbDZDrVaz/39NgHjvdjseoMPhcBuwR4FOp8MTLfpcyCKaz+fo9Xr8YjqdRr1ef+ma0WgEt9t9d+4P/w9e8njzwD+il6A+jugLRxdYyFpzC3IAAAAASUVORK5CYII='
        };

        // 扩展区汉字处理函数
        function isExtensionCharacter(char) {
            const code = char.charCodeAt(0);
            // CJK扩展区B: U+20000 - U+2A6DF
            // CJK扩展区C: U+2A700 - U+2B73F
            // CJK扩展区D: U+2B740 - U+2B81F
            // CJK扩展区E: U+2B820 - U+2CEAF
            // CJK扩展区F: U+2CEB0 - U+2EBEF
            // CJK扩展区G: U+30000 - U+3134F
            return (code >= 0x20000 && code <= 0x2A6DF) ||
                   (code >= 0x2A700 && code <= 0x2B73F) ||
                   (code >= 0x2B740 && code <= 0x2B81F) ||
                   (code >= 0x2B820 && code <= 0x2CEAF) ||
                   (code >= 0x2CEB0 && code <= 0x2EBEF) ||
                   (code >= 0x30000 && code <= 0x3134F);
        }

        function replaceExtensionChars(text) {
            if (!text) return '';
            let result = '';
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (isExtensionCharacter(char) && extensionCharImages[char]) {
                    // 使用预生成的图片
                    result += `<img src="${extensionCharImages[char]}" alt="${char}" style="vertical-align: middle; width: 24px; height: 24px; display: inline-block;">`;
                } else {
                    result += char;
                }
            }
            return result;
        }

        // 按需加载 pinyin 库
        let pinyinLoaded = false;
        let pinyinLoading = false;
        let pinyinLoadPromise = null;
        
        function loadPinyinIfNeeded() {
            if (pinyinLoaded) {
                return Promise.resolve();
            }
            
            if (pinyinLoading) {
                return pinyinLoadPromise;
            }
            
            pinyinLoading = true;
            pinyinLoadPromise = new Promise(function(resolve, reject) {
                var script = document.createElement('script');
                script.src = 'pinyin.js';
                script.onload = function() {
                    pinyinLoaded = true;
                    pinyinLoading = false;
                    resolve();
                };
                script.onerror = function() {
                    pinyinLoading = false;
                    reject(new Error('Failed to load pinyin.js'));
                };
                document.head.appendChild(script);
            });
            
            return pinyinLoadPromise;
        }
    </script>

<body>

                    <option value="id">按ID排序</option>
                    <option value="name">按姓名排序</option>

        <div id="member-detail">

    <script>
        // 全局变量
        let familyData = [];
        let currentEditingId = null;
        let filteredData = [];
        let currentPage = 1;
        const itemsPerPage = 20;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            setupEventListeners();
        });

        // 加载数据
        function loadData() {
            fetch('./new_family.json')
                .then(response => response.json())
                .then(data => {
                    familyData = data;
                    filteredData = [...familyData];
                    currentPage = 1;
                    applyFilters();
                    // 显示加载成功提示
                    showNotification('数据已刷新', 'success');
                })
                .catch(error => {
                    console.error('加载数据失败:', error);
                    alert('加载数据失败，请检查控制台获取详细信息');
                });
        }

        // 显示通知
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 4px;
                color: white;
                font-weight: bold;
                z-index: 1000;
                background-color: ${type === 'success' ? '#4CAF50' : '#f44336'};
                box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 添加成员按钮
            document.getElementById('btn-add').addEventListener('click', function() {
                openAddForm();
            });

            // 导出JSON按钮
            document.getElementById('btn-export').addEventListener('click', function() {
                exportJSON();
            });

            // GitHub配置按钮
            document.getElementById('btn-github-config').addEventListener('click', function() {
                openGitHubConfig();
            });

            // 保存GitHub配置按钮
            document.getElementById('btn-save-github-config').addEventListener('click', function() {
                saveGitHubConfig();
            });

            // 关闭GitHub配置按钮
            document.getElementById('btn-close-github-config').addEventListener('click', function() {
                closeGitHubConfig();
            });

            // 刷新数据按钮
            document.getElementById('btn-refresh').addEventListener('click', function() {
                loadData();
            });

            // 取消按钮
            document.getElementById('btn-cancel').addEventListener('click', function() {
                closeForm();
            });

            // 表单提交
            document.getElementById('member-form').addEventListener('submit', function(e) {
                e.preventDefault();
                saveMember();
            });

            // 搜索框
            document.getElementById('search-box').addEventListener('input', function() {
                applyFilters();
            });

            // 排序选择
            document.getElementById('sort-select').addEventListener('change', function() {
                applyFilters();
            });

            // 关闭详情按钮
            document.getElementById('btn-close-detail').addEventListener('click', function() {
                document.getElementById('member-detail').style.display = 'none';
            });
        }

        // 应用过滤器和排序
        function applyFilters() {
            const searchTerm = document.getElementById('search-box').value.toLowerCase();
            const sortBy = document.getElementById('sort-select').value;

            // 过滤
            filteredData = familyData.filter(member => {
                return member.name.toLowerCase().includes(searchTerm) ||
                       member.title.toLowerCase().includes(searchTerm) ||
                       member.pinyin.toLowerCase().includes(searchTerm);
            });

            // 排序
            filteredData.sort((a, b) => {
                if (sortBy === 'id') {
                    return a.id - b.id;
                } else if (sortBy === 'name') {
                    return a.name.localeCompare(b.name);
                } else if (sortBy === 'generation') {
                    return a.generation - b.generation;
                }
                return 0;
            });

            currentPage = 1;
            renderMemberList();
        }

        // 打开添加表单
        function openAddForm() {
            currentEditingId = null;
            document.getElementById('form-title').textContent = '添加成员';
            document.getElementById('member-form').reset();
            loadParentOptions();
            setupAutoCalculation();
            document.getElementById('edit-form').style.display = 'block';
        }

        // 打开编辑表单
        function openEditForm(id) {
            const member = familyData.find(m => m.id === id);
            if (!member) return;

            currentEditingId = id;
            document.getElementById('form-title').textContent = '编辑成员';
            document.getElementById('member-id').value = member.id;
            document.getElementById('name').value = member.name;
            document.getElementById('title').value = member.title || '';
            document.getElementById('birthday').value = member.birthday || '';
            document.getElementById('deathday').value = member.deathday || '';
            document.getElementById('description').value = member.description || '';
            document.getElementById('gender').value = member.gender;
            
            loadParentOptions(member.fid);
            document.getElementById('generation').value = member.generation;
            document.getElementById('pinyin').value = member.pinyin || '';
            
            setupAutoCalculation();
            document.getElementById('edit-form').style.display = 'block';
        }

        // 为内联编辑表单设置父亲搜索功能
        function setupInlineParentSearch() {
            document.querySelectorAll('.fid-search').forEach(searchInput => {
                const dropdown = searchInput.nextElementSibling;
                const form = searchInput.closest('form');
                const fidInput = form.querySelector('input[name="fid"]');
                const generationInput = form.querySelector('input[name="generation"]');
                
                // 初始化：如果有选中的父亲，显示在搜索框中
                if (fidInput.value) {
                    const selectedMember = familyData.find(m => m.id === parseInt(fidInput.value));
                    if (selectedMember) {
                        searchInput.value = `${selectedMember.name}${selectedMember.title ? ' (' + selectedMember.title + ')' : ''} (第${selectedMember.generation}代, ID:${selectedMember.id})`;
                    }
                }
                
                // 显示/隐藏下拉菜单
                searchInput.addEventListener('focus', function() {
                    if (dropdown.innerHTML === '') {
                        loadInlineParentOptions(searchInput, dropdown, fidInput, generationInput);
                    }
                    dropdown.style.display = 'block';
                });
                
                // 搜索功能
                searchInput.addEventListener('input', function() {
                    const searchTerm = this.value.toLowerCase();
                    
                    if (searchTerm.length < 1) {
                        loadInlineParentOptions(searchInput, dropdown, fidInput, generationInput);
                        dropdown.style.display = 'block';
                        return;
                    }
                    
                    loadInlineParentOptions(searchInput, dropdown, fidInput, generationInput, searchTerm);
                    dropdown.style.display = 'block';
                });

                // 点击外部关闭下拉菜单
                document.addEventListener('click', function(e) {
                    if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
                        dropdown.style.display = 'none';
                    }
                });
            });
        }

        // 加载内联编辑表单的父亲选项
        function loadInlineParentOptions(searchInput, dropdown, fidInput, generationInput, searchTerm = '') {
            dropdown.innerHTML = '';
            
            const maleMembers = familyData.filter(member => {
                return member.gender === 'male' && (
                    searchTerm === '' || 
                    member.name.toLowerCase().includes(searchTerm) ||
                    (member.title && member.title.toLowerCase().includes(searchTerm)) ||
                    member.id.toString().includes(searchTerm) ||
                    member.generation.toString().includes(searchTerm)
                );
            });

            if (maleMembers.length > 0) {
                maleMembers.forEach(member => {
                    const option = document.createElement('div');

        // 加载父亲选项列表
        function loadParentOptions(selectedFid) {
            const fidSearch = document.getElementById('fid-search');
            const fidDropdown = document.getElementById('fid-dropdown');
            const fidInput = document.getElementById('fid');
            
            // 清空下拉菜单
            fidDropdown.innerHTML = '';
            
            // 如果有选中的父亲，显示在搜索框中
            if (selectedFid) {
                const selectedMember = familyData.find(m => m.id === selectedFid);
                if (selectedMember) {
                    fidSearch.value = `${selectedMember.name} (第${selectedMember.generation}代, ID:${selectedMember.id})`;
                }
            }
            
            // 只显示男性成员作为父亲选项
            const maleMembers = familyData.filter(m => m.gender === 'male');
            
            // 初始加载前20个
            const batchSize = 20;
            let loadedCount = 0;
            
            function loadMoreMembers() {
                const membersToLoad = maleMembers.slice(loadedCount, loadedCount + batchSize);
                membersToLoad.forEach(member => {
                    const option = document.createElement('div');
                    option.className = 'fid-option';
                    option.style.cssText = 'padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #eee;';
                    option.textContent = `${member.name}${member.title ? ' (' + member.title + ')' : ''} (第${member.generation}代, ID:${member.id})`;
                    option.dataset.id = member.id;
                    option.dataset.name = member.name;
                    option.dataset.generation = member.generation;
                    
                    option.addEventListener('click', function() {
                        fidInput.value = member.id;
                        fidSearch.value = `${member.name}${member.title ? ' (' + member.title + ')' : ''} (第${member.generation}代, ID:${member.id})`;
                        fidDropdown.style.display = 'none';
                        // 触发代数自动计算
                        const event = new Event('change');
                        fidInput.dispatchEvent(event);
                    });
                    
                    fidDropdown.appendChild(option);
                });
                loadedCount += membersToLoad.length;
            }
            
            // 初始加载
            loadMoreMembers();
            
            // 搜索功能
            fidSearch.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase();
                fidDropdown.innerHTML = '';
                loadedCount = 0;
                
                if (searchTerm) {
                    const filtered = maleMembers.filter(m => 
                        m.name.toLowerCase().includes(searchTerm) ||
                        (m.title && m.title.toLowerCase().includes(searchTerm)) ||
                        m.id.toString().includes(searchTerm) ||
                        m.generation.toString().includes(searchTerm)
                    );
                    filtered.forEach(member => {
                        const option = document.createElement('div');
                        option.className = 'fid-option';
                        option.style.cssText = 'padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #eee;';
                        option.textContent = `${member.name}${member.title ? ' (' + member.title + ')' : ''} (第${member.generation}代, ID:${member.id})`;
                        option.dataset.id = member.id;
                        option.dataset.name = member.name;
                        option.dataset.generation = member.generation;
                        
                        option.addEventListener('click', function() {
                            fidInput.value = member.id;
                            fidSearch.value = `${member.name}${member.title ? ' (' + member.title + ')' : ''} (第${member.generation}代, ID:${member.id})`;
                            fidDropdown.style.display = 'none';
                            const event = new Event('change');
                            fidInput.dispatchEvent(event);
                        });
                        
                        fidDropdown.appendChild(option);
                    });
                } else {
                    loadMoreMembers();
                }
                
                fidDropdown.style.display = searchTerm ? 'block' : 'none';
            });
            
            // 显示/隐藏下拉菜单
            fidSearch.addEventListener('focus', function() {
                if (fidDropdown.innerHTML === '') {
                    loadMoreMembers();
                }
                fidDropdown.style.display = 'block';
            });
            
            // 点击外部关闭下拉菜单
            document.addEventListener('click', function(e) {
                if (!e.target.closest('#fid-search') && !e.target.closest('#fid-dropdown')) {
                    fidDropdown.style.display = 'none';
                }
            });
            
            // 滚动加载更多
            fidDropdown.addEventListener('scroll', function() {
                if (this.scrollTop + this.clientHeight >= this.scrollHeight - 10) {
                    loadMoreMembers();
                }
            });
        }

        // 设置自动计算
        function setupAutoCalculation() {
            const nameInput = document.getElementById('name');
            const fidInput = document.getElementById('fid');
            const generationInput = document.getElementById('generation');
            const pinyinInput = document.getElementById('pinyin');
            
            // 当选择父亲时，自动计算代数
            fidInput.addEventListener('change', function() {
                const fid = parseInt(this.value);
                if (fid) {
                    const parent = familyData.find(m => m.id === fid);
                    if (parent) {
                        generationInput.value = parent.generation + 1;
                    }
                } else {
                    generationInput.value = '';
                }
            });
            
            // 当输入名字时，自动生成拼音
            nameInput.addEventListener('input', function() {
                const name = this.value;
                if (name) {
                    generatePinyin(name).then(pinyin => {
                        pinyinInput.value = pinyin;
                    });
                } else {
                    pinyinInput.value = '';
                }
            });
        }

        // 生成拼音（使用 pinyin 库，与Node.js后端保持一致）
        async function generatePinyin(name) {
            if (!name) return '';
            
            // 使用 pinyin 库生成带音标的拼音
            // style: pinyin.STYLE_TONE 表示带音标的拼音（如：mào）
            // segment: false 表示不按词分词，每个字单独转换
            try {
                // 确保 pinyin 库已加载
                await loadPinyinIfNeeded();
                
                // 尝试不同的导出方式
                const pinyinFn = pinyin.default || pinyin;
                const style = pinyin.STYLE_TONE;
                
                const pinyinArray = pinyinFn(name, {
                    style: style,
                    segment: true
                });
                
                // pinyin 返回的是二维数组，需要扁平化并用空格连接
                return pinyinArray.map(item => item[0]).join(' ');
            } catch (e) {
                console.error('拼音生成失败:', e);
                // 如果失败，返回原名字
                return name;
            }
        }

        // 关闭表单
        function closeForm() {
            document.getElementById('edit-form').style.display = 'none';
            currentEditingId = null;
        }

        // 保存成员
        function saveMember() {
            // 数据验证
            if (!validateForm()) {
                return;
            }

            const formData = {
                id: parseInt(document.getElementById('member-id').value) || generateNewId(),
                name: document.getElementById('name').value,
                title: document.getElementById('title').value || '无',
                birthday: document.getElementById('birthday').value || '无',
                deathday: document.getElementById('deathday').value || '无',
                description: document.getElementById('description').value || '无',
                gender: document.getElementById('gender').value,
                generation: parseInt(document.getElementById('generation').value) || 1,
                fid: parseInt(document.getElementById('fid').value) || null,
                pinyin: document.getElementById('pinyin').value || '无',
                img: generateAvatar(document.getElementById('name').value, document.getElementById('gender').value),
                cids: []
            };

            // 处理父子关系
            if (formData.fid) {
                const parent = familyData.find(m => m.id === formData.fid);
                if (parent) {
                    // 确保 parent.cids 存在
                    if (!parent.cids) {
                        parent.cids = [];
                    }
                    if (!parent.cids.includes(formData.id)) {
                        parent.cids.push(formData.id);
                    }
                }
            }

            // 更新或添加成员
            const index = familyData.findIndex(m => m.id === formData.id);
            if (index >= 0) {
                familyData[index] = formData;
            } else {
                familyData.push(formData);
            }

            // 重新应用过滤器，确保新添加的成员也能显示
            applyFilters();
            // 重新渲染列表
            renderMemberList();
            // 显示保存成功提示
            showNotification('保存成功', 'success');
            closeForm();
        }

        // 表单验证
        function validateForm() {
            const name = document.getElementById('name').value;
            const gender = document.getElementById('gender').value;

            // 验证姓名
            if (!name.trim()) {
                alert('请输入姓名');
                document.getElementById('name').focus();
                return false;
            }

            // 验证性别
            if (!gender) {
                alert('请选择性别');
                document.getElementById('gender').focus();
                return false;
            }

            return true;
        }

        // 生成新ID
        function generateNewId() {
            if (familyData.length === 0) return 1;
            return Math.max(...familyData.map(m => m.id)) + 1;
        }

        // 根据ID获取成员名字
        function getMemberNameById(id) {
            const member = familyData.find(m => m.id === id);
            return member ? member.name : null;
        }

        // 生成头像
        function generateAvatar(name, gender) {
            // 确保名字不为空
            const safeName = name || '未知';
            // 使用完整名字（最多4个字符）
            const displayName = safeName.slice(0, 4);
            // 根据名字长度调整字体大小
            const fontSize = displayName.length === 1 ? 60 : 
                            displayName.length === 2 ? 50 : 
                            displayName.length === 3 ? 40 : 32;
            // 基于性别和名字生成颜色
            const color = generateColor(safeName, gender);
            // 创建SVG并编码
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" style="background-color: ${color};"><text x="75" y="90" font-size="${fontSize}" text-anchor="middle" fill="white" font-family="Arial, sans-serif">${displayName}</text></svg>`;
            try {
                return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
            } catch (e) {
                console.error('头像生成失败:', e);
                // 返回一个默认的头像
                return 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNTAiIGhlaWdodD0iMTUwIiBzdHlsZT0iYmFja2dyb3VuZC1jb2xvcjogIzk5OTsiPjx0ZXh0IHg9Ijc1IiB5PSI5MCIgZm9udC1zaXplPSI2MCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0id2hpdGUiIGZvbnQtZmFtaWx5PSJBcmlhbCwgc2Fucy1zZXJpZiI+PzwvdGV4dD48L3N2Zz4=';
            }
        }

        // 生成颜色
        function generateColor(name, gender) {
            // 基于名字的字符编码生成颜色
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            
            // 生成RGB值
            let r = (hash & 0xFF0000) >> 16;
            let g = (hash & 0x00FF00) >> 8;
            let b = hash & 0x0000FF;
            
            // 调整颜色亮度
            r = Math.min(200, r + 55);
            g = Math.min(200, g + 55);
            b = Math.min(200, b + 55);
            
            // 转换为十六进制
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        // 删除成员
        function deleteMember(id) {
            if (confirm('确定要删除这个成员吗？')) {
                // 从父成员的cids中移除
                familyData.forEach(member => {
                    if (member.cids && member.cids.includes(id)) {
                        member.cids = member.cids.filter(cid => cid !== id);
                    }
                });
                
                // 从数组中移除
                familyData = familyData.filter(m => m.id !== id);
                
                // 重新渲染列表
                renderMemberList();
            }
        }

        // 渲染成员列表
        function renderMemberList() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';

            // 计算分页
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedData = filteredData.slice(startIndex, endIndex);

            if (paginatedData.length === 0) {
                container.innerHTML = '<p>没有找到匹配的成员</p>';
            } else {

                    memberItem.className = 'member-item';

                    avatar.src = generateAvatar(member.name, member.gender);
                    
                    // 成员信息
                    const info = document.createElement('div');

                    const parentName = member.fid ? getMemberNameById(member.fid) : null;
                    info.innerHTML = `

                    editBtn.className = 'btn-edit';
                    editBtn.textContent = '编辑';

                    deleteBtn.addEventListener('click', () => deleteMember(member.id));
                    
                    actions.appendChild(viewBtn);
                    actions.appendChild(editBtn);
                    actions.appendChild(deleteBtn);

                    memberItem.appendChild(avatar);

                    const detailArea = document.createElement('div');

                    detailArea.style.cssText = 'display: none; margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 4px; border-left: 3px solid #4CAF50;';
                    
                    // 组装wrapper
                    memberWrapper.appendChild(memberItem);
                    memberWrapper.appendChild(detailArea);
                    
                    container.appendChild(memberWrapper);
                });
            }

            // 渲染分页
            renderPagination(totalPages);
        }

        // 渲染分页
        function renderPagination(totalPages) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            if (totalPages <= 1) return;

            // 上一页按钮
            const prevBtn = document.createElement('button');
            prevBtn.textContent = '上一页';
            prevBtn.disabled = currentPage === 1;
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderMemberList();
                }
            });
            pagination.appendChild(prevBtn);

            // 页码按钮
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.textContent = i;
                if (currentPage === i) {
                    pageBtn.classList.add('active');
                }
                pageBtn.addEventListener('click', (function(pageNum) {
                    return function() {
                        currentPage = pageNum;
                        renderMemberList();
                    };
                })(i));
                pagination.appendChild(pageBtn);
            }

            // 下一页按钮
            const nextBtn = document.createElement('button');
            nextBtn.textContent = '下一页';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderMemberList();
                }
            });
            pagination.appendChild(nextBtn);
        }

            detailArea.style.display = 'block';
            
            // 初始化父亲搜索功能
            setupInlineParentSearch();
            
            // 添加保存和取消事件
            const form = detailArea.querySelector('.inline-edit-form');
            form.querySelector('.btn-save-inline').addEventListener('click', function() {
                saveInlineEdit(id, form);
            });
            form.querySelector('.btn-cancel-inline').addEventListener('click', function() {
                detailArea.style.display = 'none';
            });
            
            // 当编辑时修改姓名，自动更新拼音和预览
            const nameInput = form.querySelector('input[name="name"]');
            const pinyinInput = form.querySelector('input[name="pinyin"]');
            const namePreview = document.getElementById(`name-preview-${id}`);
            if (nameInput && pinyinInput && namePreview) {
                nameInput.addEventListener('input', function() {
                    const name = this.value;
                    // 更新预览
                    namePreview.innerHTML = `预览: ${replaceExtensionChars(name)}`;
                    // 更新拼音
                    if (name) {
                        generatePinyin(name).then(pinyin => {
                            pinyinInput.value = pinyin;
                        });
                    } else {
                        pinyinInput.value = '';
                    }
                });
            }
        }

        // 保存内联编辑
        function saveInlineEdit(id, form) {
            const formData = new FormData(form);
            const member = familyData.find(m => m.id === id);
            if (!member) return;

            member.name = formData.get('name');
            member.title = formData.get('title');
            member.birthday = formData.get('birthday');
            member.deathday = formData.get('deathday');
            member.description = formData.get('description');
            member.gender = formData.get('gender');
            member.generation = parseInt(formData.get('generation'));
            member.fid = parseInt(formData.get('fid')) || null;
            member.pinyin = formData.get('pinyin');
            member.img = generateAvatar(member.name, member.gender);

            // 处理父子关系
            if (member.fid) {
                const parent = familyData.find(m => m.id === member.fid);
                if (parent) {
                    // 确保 parent.cids 存在
                    if (!parent.cids) {
                        parent.cids = [];
                    }
                    if (!parent.cids.includes(id)) {
                        parent.cids.push(id);
                    }
                }
            }

            // 重新应用过滤器，确保更新的成员也能显示
            applyFilters();
            // 重新渲染列表
            renderMemberList();
            showNotification('成员信息已更新', 'success');
        }

        // 显示成员详情
        function showMemberDetail(id) {
            const member = familyData.find(m => m.id === id);
            if (!member) return;

            const detailContent = document.getElementById('detail-content');
            detailContent.innerHTML = `
                <div class="detail-item">
                    <span class="detail-label">ID:</span>
                    <span>${member.id}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">姓名:</span>
                    <span>${replaceExtensionChars(member.name)}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">字号:</span>
                    <span>${replaceExtensionChars(member.title || '无')}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">生辰:</span>
                    <span>${replaceExtensionChars(member.birthday || '无')}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">卒日:</span>
                    <span>${replaceExtensionChars(member.deathday || '无')}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">简介:</span>
                    <span>${replaceExtensionChars(member.description || '无')}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">性别:</span>
                    <span>${member.gender === 'male' ? '男' : '女'}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">代数:</span>
                    <span>第${member.generation}代</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">父ID:</span>
                    <span>${member.fid || '无'}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">子女:</span>
                    <span>${member.cids && member.cids.length > 0 ? member.cids.map(cid => {
                        const child = familyData.find(m => m.id === cid);
                        return child ? `${replaceExtensionChars(child.name)} (ID:${child.id})` : `ID:${cid}`;
                    }).join(', ') : '无'}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">拼音:</span>
                    <span>${member.pinyin || '无'}</span>
                </div>
            `;

            document.getElementById('member-detail').style.display = 'block';
        }

        // 导出JSON
        function exportJSON() {
            // 检查是否有GitHub配置
            const githubConfig = getGitHubConfig();
            
            if (githubConfig.token && githubConfig.owner && githubConfig.repo) {
                // 有GitHub配置，提交到GitHub
                exportToGitHub(githubConfig);
            } else {
                // 没有GitHub配置，下载到本地
                exportToLocal();
            }
        }

        // 导出到本地
        function exportToLocal() {
            // 确保cids数组存在且正确
            familyData.forEach(member => {
                if (!member.cids) {
                    member.cids = [];
                }
            });
            
            // 生成JSON字符串
            const jsonStr = JSON.stringify(familyData, null, 2);
            
            // 创建Blob对象
            const blob = new Blob([jsonStr], { type: 'application/json' });
            
            // 创建下载链接
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'new_family.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showNotification('JSON文件已导出，请替换原有的new_family.json文件', 'success');
        }

        // 导出到GitHub
        async function exportToGitHub(config) {
            try {
                showNotification('正在提交到GitHub...', 'success');
                
                // 确保cids数组存在且正确
                familyData.forEach(member => {
                    if (!member.cids) {
                        member.cids = [];
                    }
                });
                
                // 生成JSON字符串
                const jsonStr = JSON.stringify(familyData, null, 2);
                const content = btoa(unescape(encodeURIComponent(jsonStr)));
                
                // 获取文件SHA
                const fileUrl = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${config.path}`;
                const response = await fetch(fileUrl, {
                    headers: {
                        'Authorization': `token ${config.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`获取文件失败: ${response.status}`);
                }
                
                const fileData = await response.json();
                const sha = fileData.sha;
                
                // 提交文件
                const putResponse = await fetch(fileUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${config.token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: config.message || '更新家族成员数据',
                        content: content,
                        sha: sha
                    })
                });
                
                if (putResponse.ok) {
                    showNotification('已成功提交到GitHub！', 'success');
                } else {
                    throw new Error(`提交文件失败: ${putResponse.status}`);
                }
            } catch (error) {
                console.error('提交到GitHub失败:', error);
                showNotification(`提交失败: ${error.message}`, 'error');
            }
        }

        // 打开GitHub配置
        function openGitHubConfig() {
            const config = getGitHubConfig();
            if (config.token) {
                document.getElementById('github-token').value = config.token;
            }
            if (config.owner) {
                document.getElementById('github-owner').value = config.owner;
            }
            if (config.repo) {
                document.getElementById('github-repo').value = config.repo;
            }
            if (config.path) {
                document.getElementById('github-path').value = config.path;
            }
            if (config.message) {
                document.getElementById('github-message').value = config.message;
            }
            document.getElementById('github-config').style.display = 'block';
        }

        // 保存GitHub配置
        function saveGitHubConfig() {
            const config = {
                token: document.getElementById('github-token').value,
                owner: document.getElementById('github-owner').value,
                repo: document.getElementById('github-repo').value,
                path: document.getElementById('github-path').value,
                message: document.getElementById('github-message').value
            };
            
            // 保存到localStorage
            localStorage.setItem('githubConfig', JSON.stringify(config));
            
            showNotification('GitHub配置已保存', 'success');
            closeGitHubConfig();
        }

        // 关闭GitHub配置
        function closeGitHubConfig() {
            document.getElementById('github-config').style.display = 'none';
        }

        // 更新内联编辑表单中的代数
        function updateInlineGeneration(selectElement) {
            const form = selectElement.closest('form');
            const generationInput = form.querySelector('input[name="generation"]');
            const selectedOption = selectElement.selectedOptions[0];
            
            if (selectedOption && selectedOption.value) {
                const parentGeneration = parseInt(selectedOption.dataset.generation);
                generationInput.value = parentGeneration + 1;
            } else {
                // 没有选择父亲，设为1代
                generationInput.value = 1;
            }
        }

        // 获取GitHub配置
        function getGitHubConfig() {
            const configStr = localStorage.getItem('githubConfig');
            if (configStr) {
                try {
                    return JSON.parse(configStr);
                } catch (e) {
                    console.error('解析GitHub配置失败:', e);
                    return {};
                }
            }
            return {};
        }
    </script>
</body>
