<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>傅氏家族关系图</title>
    <style>
        /*CSS*/
        html, body {
            margin: 0px;
            padding: 0px;
            width: 100%;
            height: 100%;
            font-family: Helvetica;
            overflow: hidden;
        }

        #tree {
            width: 100%;
            height: 100%;
        }

        #tree > svg > g > text{
            fill: black;
        }
    </style>
</head>
<body>
<!--HTML-->
<script src="FamilyTree.js"></script>
<a id="downloadLink" style="display:none;">Download PNG</a>
<div id="tree"></div>
  <script>
   //JavaScript
       /**
    * @description: 文字生成图片
    * @param text {String} 图片的文本内容
    * @param imgW {Number} 图片的宽度
    * @param imgH {Number} 图片的高度
    * @param bgColor {String} 图片的背景颜色
    * @param fontSize {Number} 字体大小
    * @param fontFamily {String} 字体风格
    * @param fontColor {String} 字体颜色
    * @param x {Number} 文本绘制x方向坐标
    * @param y {Number} 文本绘制y方向坐标
    * @return {*}
    */
    function textToImage(id,text, backgroundColor) {
        console.log(id,text, backgroundColor);
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 150;
        canvas.height = 150;

        // 设置背景色
        ctx.fillStyle = backgroundColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 设置文字样式
        ctx.fillStyle = 'white';
        ctx.font = 'bold 60px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text.slice(0, 4), canvas.width/2, canvas.height/2);
        return canvas.toDataURL;
    }

    // 家族数据结构示例
    var familyData = []
    fetch('./new_family.json').then(response => response.json())
    .then(data => {
            // console.log('原始数据:', data);
            
            // 添加一个颜色缓存对象，用于存储每代的颜色
            const generationColorCache = {};

            function getGenerationColor(generation) {
                // 如果这一代已经有分配的颜色，直接返回
                if (generationColorCache[generation]) {
                    return generationColorCache[generation];
                }

                // 生成更亮的颜色
                const randomColor = generateRandomColor();
                
                // 缓存这一代的颜色
                generationColorCache[generation] = randomColor;
                
                return randomColor;
            }

            // 生成更亮的颜色
            function generateRandomColor() {
                const r = Math.floor(Math.random() * 128) + 50; // 50-178
                const g = Math.floor(Math.random() * 128) + 50; // 50-178
                const b = Math.floor(Math.random() * 128) + 50; // 50-178
                return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
            }

            // 预处理数据，处理父子关系
            const processedData = data.map(node => {

                const backgroundColor = getGenerationColor(node.generation);

                // 生成头像
                const imgData = generateAvatar(node.name, node.gender, backgroundColor);

                return {
                    ...node,
                    generation: "第" + node.generation + "代",
                    img: imgData
                };
            });

            // 生成头像
            function generateAvatar(name, gender, backgroundColor) {
                // 扩展区汉字图片数据（在电脑端预生成）
                const extensionCharImages = {
                    '𰾫': 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAAAXNSR0IArs4c6QAAAedJREFUSEvtlb/LQWEUx79GP8pAWSXFRpLFf2BRDAqbQWyKSQiTUjYxmGRgk1IWEyWDGBQmo8QmRm/n1NWL50a9r+XtfZZ779Nzz/ecz/meexXX6/WKDy7F3xVYr9doNBrI5/NQKpU3iOPxGNvtFqFQCN1uF1arFRaLRRayLCIKRAGCwSDsdjvoWVrFYhGtVgvVapX36V6n0wlFZAUqlQo8Hg+/1O/34XK5QIFjsRhOpxN8Ph/K5TLi8ThUKhXO57NQRChwuVxQq9UwnU6h1Wrh9/sxmUxgMplgNBoZkdPpRCAQwGKx4CRsNhva7fYTLqEA8V+tVvB6vU/sJQGNRgO9Xg+Hw8E9oqREVQgFCEU2m70Fj0ajXMV+v+cKlsslDAYDN5iqSKVS3HTRehI4Ho+YzWacGTUxmUxyZrQnCTSbTSQSCcZBmedyOUQiEaGbngQ2m82tWZLAo02HwyEymcxb8y+sgModDAZ3AQqFAjf5EQX1i1xGFb2FSDpEqL5XQF4Ph8PCIHIOosOyc/AoIE0w2ZMcRg2Wrj+qgAapVCrBbDZDrVaz/39NgHjvdjseoMPhcBuwR4FOp8MTLfpcyCKaz+fo9Xr8YjqdRr1ef+ma0WgEt9t9d+4P/w9e8njzwD+il6A+jugLRxdYyFpzC3IAAAAASUVORK5CYII='
                };
                
                const safeName = name || '未知';
                const displayName = safeName.slice(0, 4);
                const fontSize = displayName.length === 1 ? 60 : 
                                displayName.length === 2 ? 50 : 
                                displayName.length === 3 ? 40 : 32;
                
                // 使用Canvas生成头像
                const canvas = document.createElement('canvas');
                canvas.width = 150;
                canvas.height = 150;
                const ctx = canvas.getContext('2d');
                
                // 设置背景色
                ctx.fillStyle = backgroundColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 检查是否包含扩展区汉字
                const hasExtensionChar = displayName.split('').some(char => {
                    const code = char.charCodeAt(0);
                    return (code >= 0x20000 && code <= 0x2A6DF) ||
                           (code >= 0x2A700 && code <= 0x2B73F) ||
                           (code >= 0x2B740 && code <= 0x2B81F) ||
                           (code >= 0x2B820 && code <= 0x2CEAF) ||
                           (code >= 0x2CEB0 && code <= 0x2EBEF) ||
                           (code >= 0x30000 && code <= 0x3134F);
                });
                
                if (hasExtensionChar) {
                    // 如果包含扩展区汉字，使用预生成的图片
                    ctx.fillStyle = 'white';
                    ctx.font = `bold ${fontSize}px 'Source Han Sans CN', 'Noto Sans CJK', 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', 'Heiti TC', 'STHeiti', 'SimHei', 'Arial Unicode MS', 'Droid Sans Fallback', sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(displayName, canvas.width / 2, canvas.height / 2);
                } else {
                    // 正常绘制常用字
                    ctx.fillStyle = 'white';
                    ctx.font = `bold ${fontSize}px 'Source Han Sans CN', 'Noto Sans CJK', 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', 'Heiti TC', 'STHeiti', 'SimHei', 'Arial Unicode MS', 'Droid Sans Fallback', sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(displayName, canvas.width / 2, canvas.height / 2);
                }
                
                return canvas.toDataURL('image/png');
            }
            
            // console.log('处理后的数据:', processedData);
            
            var options = getOptions();
            
            // 确保FamilyTree对象存在
            if (typeof FamilyTree === 'undefined') {
                console.error('FamilyTree library is not loaded');
                return;
            }
            
            // 确保FamilyTree.elements对象存在
            if (!FamilyTree.elements) {
                FamilyTree.elements = {};
            }
            
            // 确保generateId函数存在
            if (!FamilyTree.elements.generateId) {
                var idCounter = 0;
                FamilyTree.elements.generateId = function() {
                    return 'bft-input-' + (++idCounter);
                };
            }
            
            // 自定义ID显示元素
            FamilyTree.elements.myIdDisplay = function (data, editElement, minWidth, readOnly) {
                var value = data[editElement.binding];
                if (value == undefined) value = '';
                var id = FamilyTree.elements.generateId();
                return {
                    html: `<div class="bft-form-field" style="min-width: 280px;">
                                <div class="bft-input" data-bft-input-disabled="">
                                    <label for="${id}" style="color:#acacac; display: block; margin-bottom: 5px;">${editElement.label}</label>
                                </div>
                               <div id="${id}" data-binding="${editElement.binding}" style="
                                   width: 100%;
                                   display: block;
                                   min-height: 20px;
                                   margin-top: 35px;
                                   margin-left: 10px;
                                   font-family: inherit;
                                   font-size: 14px;
                                   color: #333;
                                   box-sizing: border-box;
                                   white-space: normal;
                                   word-wrap: break-word;
                               ">${value}</div>
                           </div>`
                };
            };
            
            // 自定义父亲显示元素
            FamilyTree.elements.myFatherDisplay = function (data, editElement, minWidth, readOnly) {
                var fid = data.fid;
                var displayValue = '无';
                if (fid) {
                    var father = processedData.find(m => m.id === fid);
                    if (father) {
                        displayValue = `${father.name} (ID:${father.id})`;
                    } else {
                        displayValue = `ID:${fid}`;
                    }
                }
                var id = FamilyTree.elements.generateId();
                return {
                    html: `<div class="bft-form-field" style="min-width: 280px;">
                                <div class="bft-input" data-bft-input-disabled="">
                                    <label for="${id}" style="color:#acacac; display: block; margin-bottom: 5px;">${editElement.label}</label>
                                </div>
                               <div id="${id}" data-binding="fid" style="
                                   width: 100%;
                                   display: block;
                                   min-height: 20px;
                                   margin-top: 35px;
                                   margin-left: 10px;
                                   font-family: inherit;
                                   font-size: 14px;
                                   color: #333;
                                   box-sizing: border-box;
                                   white-space: normal;
                                   word-wrap: break-word;
                               ">${displayValue}</div>
                           </div>`
                };
            };
            
            // 自定义子女显示元素
            FamilyTree.elements.myChildrenDisplay = function (data, editElement, minWidth, readOnly) {
                var cids = data.cids;
                var displayValue = '无';
                if (cids && cids.length > 0) {
                    displayValue = cids.map(cid => {
                        var child = processedData.find(m => m.id === cid);
                        return child ? `${child.name} (ID:${child.id})` : `ID:${cid}`;
                    }).join(', ');
                }
                var id = FamilyTree.elements.generateId();
                return {
                    html: `<div class="bft-form-field" style="min-width: 280px;">
                                <div class="bft-input" data-bft-input-disabled="">
                                    <label for="${id}" style="color:#acacac; display: block; margin-bottom: 5px;">${editElement.label}</label>
                                </div>
                               <div id="${id}" data-binding="cids" style="
                                   width: 100%;
                                   display: block;
                                   min-height: 20px;
                                   margin-top: 35px;
                                   margin-left: 10px;
                                   font-family: inherit;
                                   font-size: 14px;
                                   color: #333;
                                   box-sizing: border-box;
                                   white-space: normal;
                                   word-wrap: break-word;
                               ">${displayValue}</div>
                           </div>`
                };
            };
            
            FamilyTree.elements.myTextArea = function (data, editElement, minWidth, readOnly) {
                var id = FamilyTree.elements.generateId();
                var value = data[editElement.binding];
                if (value == undefined) value = '';
                if (readOnly && !value) {
                    return {
                        html: ''
                    };
                }
                var rOnlyAttr = readOnly ? 'readonly' : '';
                var rDisabledAttr = readOnly ? 'disabled' : '';
                return {
                    html: `<div class="bft-form-field" style="min-width: 280px;">
                                <div class="bft-input" data-bft-input-disabled="">
                                    <lable for="${id}" style="color:#acacac;padding-left: 10px;">${editElement.label}</lable>
                                </div>
                           </div>
                           <textarea ${rDisabledAttr} ${rOnlyAttr} 
                                        id="${id}" 
                                        name="${id}" 
                                        data-binding="${editElement.binding}"
                                        style="
                                            margin-left: 12px;
                                            width: 100%;
                                            display: block;
                                            min-height: 150px;
                                            padding: 12px;
                                            border: "1px solid #e0e0e0";
                                            border-radius: 6px;
                                            background-color: "#fafafa";
                                            font-family: inherit;
                                            font-size: 14px;
                                            line-height: 1.6;
                                            color: "#333";
                                            resize: none;
                                            box-sizing: border-box;
                                            outline: none;
                                            box-shadow: "inset 0 1px 2px rgba(0,0,0,0.03)";
                                    ">${value}
                            </textarea>
                        `,
                    id: id,
                    value: value
                };
            };

            // 添加额外的CSS样式
            const style = document.createElement('style');
            style.textContent = `

                /* 自定义滚动条样式 */
                textarea::-webkit-scrollbar {
                    width: "6px!important";
                }
                
                textarea::-webkit-scrollbar-track {
                    background: "#f1f1f1";
                    border-radius: "4px!important";
                }
                
                textarea::-webkit-scrollbar-thumb {
                    background: "#ddd";
                    border-radius: "4px!important";
                }
                
                textarea::-webkit-scrollbar-thumb:hover {
                    background: "#ccc";
                }
            `;
            document.head.appendChild(style);

            var chart = new FamilyTree(document.getElementById("tree"), {
                mouseScrool: FamilyTree.action.zoom,
                nodeMouseClick: FamilyTree.action.details,
                scaleInitial: options.scaleInitial,
                enableSearch: false,
                siblingSeparation: 80,
                levelSeparation: 120,
                template: "john",
                editForm: {
                    readOnly: true,
                    generateElementsFromFields: false,
                    addMore: false,
                    elements: [
                        { type: 'myIdDisplay', label: 'ID', binding: 'id' },
                        { type: 'textbox', label: '姓名', binding: 'name' },
                        { type: 'textbox', label: '字号', binding: 'title' },
                        { type: 'textbox', label: '生辰', binding: 'birthday' },
                        { type: 'textbox', label: '卒日', binding: 'deathday' },
                        { type: 'textbox', label: '代数', binding: 'generation' },
                        { type: 'textbox', label: '拼音', binding: 'pinyin' },
                        { type: 'myFatherDisplay', label: '父亲' },
                        { type: 'myChildrenDisplay', label: '子女' },
                        { type: 'myTextArea', label: '简介', binding: 'description'},
                        { type: 'select', 
                          label: '性别', 
                          binding: 'gender',
                          options: [
                            { value: 'male', text: '男' },
                            { value: 'female', text: '女' }
                          ]
                        }
                    ],
                    buttons: {
                        edit: null,
                        share: null,
                        remove: null,
                        pdf: {
                            icon: FamilyTree.icon.pdf(24, 24, '#fff'),
                            text: '导出PDF'
                        }
                    }
                },
                nodeBinding: {
                    field_0: "title",
                    field_1: "generation",
                    img_0: "img",
                },
                maxDepth: 5,
                orientation: FamilyTree.orientation.top,
                orderBy: "generation",
                tags: {
                    color: '#757575',
                    stroke: '#757575',
                    strokeWidth: 2,
                },  
                padding: 30,
                zoom: {
                    speed: 130,
                    smooth: 10
                },
                nodes: processedData
            });

            chart.on('click', function(sender, args){
                if (args.node) {
                    chart.editUI.show(args.node.id,true);
                }
                return false;
            });

            FamilyTree.templates.john.field_0 = 
                '<text class="field_0" style="font-size: 18px;" fill="#000000" x="125" y="145" text-anchor="middle">{val}</text>';
            FamilyTree.templates.john.field_1 = 
                '<text class="field_1" style="font-size: 14px;" fill="#666666" x="125" y="125" text-anchor="middle">{val}</text>';

            FamilyTree.templates.john.img_0 = 
                '<image preserveAspectRatio="xMidYMid slice" xlink:href="{val}" x="0" y="0" width="150" height="150"></image>';

            chart.on('redraw', function(sender) {
                setTimeout(() => {
                    const texts = document.querySelectorAll('#tree > svg > g > text');
                    texts.forEach(text => {
                        if (text.getAttribute('data-width') === "230") {
                            text.setAttribute('y', '145');
                        } else if (text.getAttribute('data-width') === "150") {
                            text.setAttribute('y', '165');
                        }
                    });
                }, 100);
            });

            chart.load(processedData);

            // 自定义表单标题
            chart.editUI.on('show', function(sender, args){
                setTimeout(() => {
                    var modal = document.querySelector('.bft-edit-form');
                    if (modal) {
                        var titleDiv = modal.querySelector('.bft-edit-form-title');
                        if (titleDiv) {
                            titleDiv.textContent = '个人详情';
                        }
                    }
                }, 100);
            });

    })
    .catch(error => {
        console.error('错误详情:', error);
        alert('加载家谱数据时发生错误，请检查控制台获取详细信息');
    });


    function getOptions(){
        const searchParams = new URLSearchParams(window.location.search);
        var fit = searchParams.get('fit');
        var enableSearch = true;
        var scaleInitial = 1;
        if (fit == 'yes'){
            enableSearch = false;
            scaleInitial = FamilyTree.match.boundary;
        }
        return {enableSearch, scaleInitial};
    }
  </script>
  </body>
  </html>
