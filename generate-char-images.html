<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>生成扩展区汉字图片</title>
</head>
<body>
    <h1>生成扩展区汉字图片</h1>
    <div id="output"></div>
    
    <script>
        // 需要生成图片的扩展区汉字
        const extensionChars = ['𰾫'];
        
        // 生成单个字符的图片
        function generateCharImage(char, fontSize = 16) {
            const canvas = document.createElement('canvas');
            canvas.width = fontSize * 1.5;
            canvas.height = fontSize * 1.5;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'black';
            ctx.font = `${fontSize}px 'Source Han Sans CN', 'Noto Sans CJK', 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', 'Heiti TC', 'STHeiti', 'SimHei', 'Arial Unicode MS', 'Droid Sans Fallback', sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.fillText(char, canvas.width / 2, canvas.height / 2);
            
            return canvas.toDataURL('image/png');
        }
        
        // 生成所有字符的图片
        const output = document.getElementById('output');
        extensionChars.forEach(char => {
            const imgData = generateCharImage(char, 16);
            const img = document.createElement('img');
            img.src = imgData;
            img.style.width = '24px';
            img.style.height = '24px';
            img.style.margin = '10px';
            img.style.border = '1px solid #ccc';
            
            const div = document.createElement('div');
            div.innerHTML = `
                <h3>字符: ${char}</h3>
                <p>Base64数据:</p>
                <textarea style="width: 100%; height: 100px;">${imgData}</textarea>
                <p>预览:</p>
            `;
            div.appendChild(img);
            output.appendChild(div);
        });
    </script>
</body>
</html>
